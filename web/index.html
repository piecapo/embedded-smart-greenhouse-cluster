<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能大棚蔬菜集群看板</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Embedded Greenhouse Cluster</p>
      <h1>智能大棚蔬菜集群看板</h1>
    </div>
    <button id="refreshButton">刷新模拟数据</button>
  </header>

  <main>
    <section class="summary-grid" id="summary"></section>
    <section class="layout">
      <div>
        <h2>大棚节点</h2>
        <div class="node-grid" id="nodes"></div>
      </div>
      <aside>
        <h2>实时预警</h2>
        <div id="alerts" class="alerts"></div>
      </aside>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
